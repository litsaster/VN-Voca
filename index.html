<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VN Voca – Vietnamese Vocabulary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet" />
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #3c2415 0%, #5a3a28 40%, #6b4a35 100%);
        font-family: 'Inter', sans-serif;
        transition: opacity 0.5s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash-pattern {
        position: absolute;
        inset: 0;
        opacity: 0.04;
        background-image: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.3) 40px, rgba(255,255,255,0.3) 41px);
      }
      #splash-blur1 {
        position: absolute;
        top: -80px;
        right: -80px;
        width: 256px;
        height: 256px;
        border-radius: 50%;
        background: rgba(138,96,64,0.4);
        filter: blur(64px);
      }
      #splash-blur2 {
        position: absolute;
        bottom: -80px;
        left: -80px;
        width: 256px;
        height: 256px;
        border-radius: 50%;
        background: rgba(90,58,40,0.4);
        filter: blur(64px);
      }
      #splash-inner {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      #splash-icon {
        width: 56px;
        height: 56px;
        color: #c9a45e;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
      }
      #splash-title {
        font-size: 36px;
        font-weight: 700;
        color: white;
        text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        letter-spacing: -0.025em;
      }
      #splash-sub {
        font-size: 13px;
        color: rgba(255,255,255,0.7);
        font-weight: 300;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      #splash-dots {
        margin-top: 16px;
        display: flex;
        gap: 8px;
      }
      #splash-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #c9a45e;
        animation: splash-bounce 1.4s infinite ease-in-out both;
      }
      #splash-dots span:nth-child(1) { animation-delay: 0ms; }
      #splash-dots span:nth-child(2) { animation-delay: 150ms; }
      #splash-dots span:nth-child(3) { animation-delay: 300ms; }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
      }
      #root {
        display: none;
      }
      #root.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-pattern"></div>
      <div id="splash-blur1"></div>
      <div id="splash-blur2"></div>
      <div id="splash-inner">
        <svg id="splash-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
        </svg>
        <div id="splash-title">VN Voca</div>
        <div id="splash-sub">Vietnamese Vocabulary</div>
        <div id="splash-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
